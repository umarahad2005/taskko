<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Taskko — Frame Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#0F0F1A; --ink-2:#2E2E3F; --ink-3:#6B6B82; --ink-4:#A8A8BC;
    --line:#ECECF3; --line-2:#DCDCE7; --surface:#FFFFFF;
    --primary:#1FB6F0; --primary-2:#5BCBF5; --primary-soft:#DDF3FE; --primary-deep:#0E8FC4;
    --energy:#FF8A65; --energy-soft:#FFE6DD; --mint:#34D399; --mint-soft:#D6F5E6;
    --gold:#F5C544; --gold-soft:#FFF1C9; --rose:#F472B6; --lav:#C7B8FF;
  }
  html,body{margin:0;padding:0;background:#fff;}
  *{box-sizing:border-box;}
  body{font-family:'Manrope',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}
  .phone-scroll::-webkit-scrollbar{width:0;}
  /* freeze animations for clean capture */
  *,*::before,*::after{animation:none !important;}
  @keyframes pop{from{opacity:1;transform:none;}to{opacity:1;transform:none;}}
  @keyframes fade-in{from{opacity:1;transform:none;}to{opacity:1;transform:none;}}
  @keyframes float{from{transform:none;}to{transform:none;}}
  @keyframes spark{from{opacity:1;transform:none;}to{opacity:1;transform:none;}}
  @keyframes shimmer{from{background-position:0 0;}to{background-position:0 0;}}
  @keyframes pulse-ring{from{box-shadow:none;}to{box-shadow:none;}}

  #stage{
    width:402px; height:874px;
    position:absolute; top:0; left:0;
    transform-origin:top left;
  }
  /* Force the loaded Manrope webfont for body text so the capture backend
     renders true-to-design (—apple-system falls back to a wide font headless).
     Inline Fraunces / JetBrains Mono on specific elements still win. */
  #stage * { font-family: 'Manrope', system-ui, sans-serif; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#1FB6F0">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#1FB6F0"/>
    <path d="M480 400 L560 480 L740 320" fill="none" stroke="#fff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</template>
<div id="stage"></div>

<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/babel.min.js"></script>

<script type="text/babel" src="ios-frame.jsx?v=3"></script>
<script type="text/babel" src="tweaks-panel.jsx?v=3"></script>
<script type="text/babel" src="components.jsx?v=3"></script>
<script type="text/babel" src="auth.jsx?v=3"></script>
<script type="text/babel" src="screens.jsx?v=3"></script>

<script type="text/babel">
const noop = () => {};

function frameState(o = {}) {
  return {
    user: { name:'Sara', initials:'S' },
    streak: { days:5, shields:2 },
    points: 1240, rank:'Pro', mood:'focused',
    todayTasks: [
      { id:'t1', title:'Read CS-201 lecture 7 notes', minutes:30, points:40, goal:'CS-201 midterm', done:true },
      { id:'t2', title:'Practice 5 BST problems',     minutes:45, points:60, goal:'CS-201 midterm', done:true },
      { id:'t3', title:'Draft sociology essay intro', minutes:25, points:30, goal:'Essay due Friday', done:false },
      { id:'t4', title:'Review flashcards: Stats',    minutes:20, points:25, goal:'Stats quiz Mon',  done:false },
      { id:'t5', title:'Email TA about extension',    minutes: 5, points:10, goal:'Admin',           done:false },
    ],
    nextTask: { title:'Draft sociology essay intro', minutes:25, points:30, goal:'Essay due Friday' },
    goalDraft:'', planStep:'input', planTasks:[],
    chatMessages: [
      { from:'tako', text:"Hey! I noticed your CS reading is overdue by a day. No drama — want me to slot it into tonight, or push it to tomorrow?" },
      { from:'tako', kind:'nudge', text:"Your 5-day streak is alive 🔥 One 25-minute task tonight keeps it going.", actions:['Start a session','Remind me in 1h'] },
      { from:'me', text:"I'm stuck on the practice problems, can't focus" },
      { from:'tako', text:"Totally fair. Let's shrink the next task — pick the smallest piece you can finish in 10 minutes and I'll start a focus timer. Often momentum > motivation." },
      { from:'me', text:"Can you motivate me?" },
      { from:'tako', text:"You're 320 points from Elite and on a 5-day streak. One task at a time. 🚀" },
    ],
    ...o,
  };
}

const PLAN_REVIEW = [
  { id:'p1', title:'Re-read chapters 5 & 6',          minutes:45, points:60 },
  { id:'p2', title:'Solve 10 graph traversal problems',minutes:60, points:80 },
  { id:'p3', title:'Watch recitation recordings',     minutes:40, points:45 },
  { id:'p4', title:'Build DP cheat sheet',            minutes:35, points:50 },
  { id:'p5', title:'Take a timed mock exam',          minutes:90, points:120 },
  { id:'p6', title:'Review missed mock questions',    minutes:30, points:40 },
];

function Phone({ children, tab }) {
  return (
    <IOSDevice width={402} height={874}>
      <div style={{position:'relative', height:'100%', background:'transparent'}}>
        {children}
        {tab && <TabBar tab={tab} setTab={noop}/>}
      </div>
    </IOSDevice>
  );
}

const FRAMES = {
  splash:     () => <Phone><SplashScreen onDone={noop} autoAdvance={false}/></Phone>,
  onboarding1:() => <Phone><OnboardingScreen onFinish={noop} onSkip={noop} initialSlide={0}/></Phone>,
  onboarding2:() => <Phone><OnboardingScreen onFinish={noop} onSkip={noop} initialSlide={1}/></Phone>,
  onboarding3:() => <Phone><OnboardingScreen onFinish={noop} onSkip={noop} initialSlide={2}/></Phone>,
  signup:     () => <Phone><SignUpScreen onSignUp={noop} onGoLogin={noop}/></Phone>,
  login:      () => <Phone><LoginScreen onLogin={noop} onGoSignup={noop}/></Phone>,
  home:       () => <Phone tab="home"><HomeScreen state={frameState()} dispatch={noop} annotate={false} goTo={noop} isAdmin={false}/></Phone>,
  plan:       () => <Phone tab="plan"><PlanScreen state={frameState({ planStep:'review', goalDraft:'Prep for CS-201 midterm by Friday', planTasks: PLAN_REVIEW })} dispatch={noop} annotate={false} goTo={noop}/></Phone>,
  hub:        () => <Phone tab="hub"><HubScreen state={frameState()} dispatch={noop} annotate={false}/></Phone>,
  chat:       () => <Phone tab="chat"><ChatScreen state={frameState()} dispatch={noop} annotate={false}/></Phone>,
};

let root = ReactDOM.createRoot(document.getElementById('stage'));
window.__renderFrame = (name) => {
  const f = FRAMES[name] || FRAMES.splash;
  root.render(f());
};
window.__frameList = Object.keys(FRAMES);

// initial
window.__renderFrame((location.hash || '#splash').slice(1));
</script>
</body>
</html>

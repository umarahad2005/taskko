<meta charset="utf-8" />

<title>Taskko — AI Productivity Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0F0F1A;
    --ink-2: #2E2E3F;
    --ink-3: #6B6B82;
    --ink-4: #A8A8BC;
    --line: #ECECF3;
    --line-2: #DCDCE7;
    --bg: #F7F6FB;
    --surface: #FFFFFF;
    --primary: #1FB6F0;
    --primary-2: #5BCBF5;
    --primary-soft: #DDF3FE;
    --energy: #FF8A65;
    --energy-soft: #FFE6DD;
    --mint: #34D399;
    --mint-soft: #D6F5E6;
    --gold: #F5C544;
    --gold-soft: #FFF1C9;
    --rose: #F472B6;
    --lav: #C7B8FF;
  }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1100px 700px at 12% -10%, #DDF3FE 0%, transparent 55%),
      radial-gradient(900px 600px at 100% 110%, #FFE9DE 0%, transparent 55%),
      #F4F2FA;
    color: var(--ink);
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .serif { font-family: 'Fraunces', serif; }
  * { box-sizing: border-box; }
  /* Hide scrollbars inside phone */
  .phone-scroll::-webkit-scrollbar { width: 0; }
  /* Subtle tap animation */
  .tap { transition: transform .12s ease, opacity .12s ease, box-shadow .2s ease; }
  .tap:active { transform: scale(0.97); }
  @keyframes pop { 0%{transform:scale(.6); opacity:0;} 60%{transform:scale(1.08); opacity:1;} 100%{transform:scale(1);} }
  @keyframes fade-in { from{opacity:1; transform:none;} to{opacity:1; transform:none;} }
  @keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
  @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(31,182,240,.35);} 70%{box-shadow:0 0 0 18px rgba(31,182,240,0);} 100%{box-shadow:0 0 0 0 rgba(31,182,240,0);} }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes spark { 0%,100%{opacity:.6; transform:scale(1);} 50%{opacity:1; transform:scale(1.15);} }
  .pop { animation: pop .35s cubic-bezier(.2,1.2,.4,1); }
  .fade-in { animation: fade-in .35s ease both; }
  .shimmer {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
  }
</style>
</head>

      </linearGradient>
    </defs>
    <rect width="1200" height="800" fill="url(#splashBg)"/>
    <g transform="translate(600 400)">

      <path d="M-160 0 C -160 -180, -80 -260, 100 -260 C 280 -260, 360 -180, 360 0 C 360 180, 280 260, 100 260 C -80 260, -160 180, -160 0 Z" fill="rgba(255,255,255,0.10)"/>
      <g transform="translate(0 0)">
        <path d="M-150 0 L -30 110 L 200 -130" fill="none" stroke="#fff" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M210 -200 l 12 -28 l 28 12 l -28 12 l -12 28 l -12 -28 l -28 -12 l 28 -12 Z" fill="url(#splashSpark)"/>
      </g>
    </g>
    <text x="600" y="660" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="78" fill="#fff" letter-spacing="-2">taskko</text>
    <text x="600" y="710" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="500" font-size="22" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">your AI productivity companion</text>
